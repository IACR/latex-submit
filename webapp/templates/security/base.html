{% extends "base.html" %}
{% block endOfHead %}
  <style>
   .fs-center { text-align: center }
   .fs-important { font-size: larger; font-weight: bold }
   .fs-gap { margin-top: 20px; }
   .fs-div { margin: 4px; }
   .fs-error-msg { color: darkred; }
  </style>
{% endblock %}
{% block page_content %}
  <main id="mainContent" class="container px-3 px-md-4 mt-3">
    {% block navbar %}
    {%- endblock navbar %}
    {% block content %}
    {% endblock content %}
    {% block scripts %}
    {%- endblock scripts %}
  </main>
{% endblock page_content -%}
