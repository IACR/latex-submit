# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Basic tests for app.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # allows you to manually execute this pipeline from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app_test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install Xapian
      run: |
        sudo apt-get install -y libxapian30
        sudo apt-get install -y libxapian-dev
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python3 -m pip install beautifulsoup4
        python -m pip install pytest
        if [ -f webapp/requirements.txt ]; then pip install -r webapp/requirements.txt; fi
    - name: Tests for app
      run: |
        python -m pytest tests/admin_test.py -vv
        python -m pytest tests/forms_test.py -vv
        python -m pytest tests/routes_test.py -vv
